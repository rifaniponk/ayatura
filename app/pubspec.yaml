name: ayatura
description: "Ayatura — Daily Surah Planner: assign Quran surahs to each prayer across the month."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  collection: ^1.19.1
  flutter_riverpod: ^3.3.1
  intl: ^0.20.0

  flutter_localizations:
    sdk: flutter
  form_builder_validators: ^11.3.0

  flutter_svg: ^2.2.4

  drift: ^2.32.1
  drift_flutter: ^0.3.0
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.5.5
  http: ^1.2.0
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  package_info_plus: ^9.0.1
  home_widget: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

  drift_dev: ^2.32.1
  build_runner: ^2.15.0

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true
  image_path: assets/images/app_icon.png
  adaptive_icon_background: "#0F3D2E"
  adaptive_icon_foreground: assets/images/app_icon.png
  remove_alpha_ios: true
  background_color_ios: "#0F3D2E"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/app_icon.png
    - assets/images/empty_month_plan.png
    - assets/images/ayatura_ilustrator.png
    - assets/images/logo/
    - assets/svg/crescent_mark.svg
    - assets/svg/app_icon.svg
    - assets/svg/logo_lockup.svg
    - assets/data/surahs.json
