name: surah_planner
description: "Surah Planner — assign Quran surahs to each prayer across the month."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  collection: ^1.19.1
  flutter_riverpod: ^3.3.1
  intl: ^0.20.0

  flutter_localizations:
    sdk: flutter
  form_builder_validators: ^11.3.0

  flutter_svg: ^2.2.4

  drift: ^2.32.1
  drift_flutter: ^0.3.0
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.5.5
  http: ^1.2.0
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  drift_dev: ^2.32.1
  build_runner: ^2.15.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/app_icon.png
    - assets/images/adaptive_icon_foreground.png
    - assets/images/splash.png
    - assets/images/background.png
    - assets/svg/crescent_mark.svg
    - assets/svg/app_icon.svg
    - assets/svg/logo_lockup.svg
    - assets/data/surahs.json
