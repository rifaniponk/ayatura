name: surah_planner
description: "Surah Planner — assign Quran surahs to each prayer across the month."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  flutter_svg: ^2.0.10+1

  drift: ^2.18.0
  drift_flutter: ^0.3.0
  path_provider: ^2.1.4
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  drift_dev: ^2.18.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true

  assets:
    - assets/images/app_icon.png
    - assets/images/adaptive_icon_foreground.png
    - assets/images/splash.png
    - assets/images/background.png
    - assets/svg/crescent_mark.svg
    - assets/svg/app_icon.svg
    - assets/svg/logo_lockup.svg
    - assets/data/surahs.json
